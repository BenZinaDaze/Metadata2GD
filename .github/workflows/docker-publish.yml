name: Build and Push Docker Image

on:
  push:
    tags:
      - 'v*'          # 只有 v 开头的 tag 才触发（如 v1.0.0、v2.1.3）
  pull_request:
    branches:
      - main          # PR 到 main 时只构建验证，不推送
  workflow_dispatch:  # 允许手动触发（自动推送最新 tag + latest）

env:
  DOCKERHUB_IMAGE: benz1/meta2cloud

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: Dockerhub   # 声明使用该 Environment，才能读取其中的 secrets

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # 获取完整历史，确保能读取所有 tag

      # 手动触发时自动获取最新 v* tag
      - name: Resolve version
        id: resolve
        if: github.event_name == 'workflow_dispatch'
        run: |
          LATEST=$(git tag --sort=-version:refname | grep -E '^v' | head -n1)
          echo "version=${LATEST}" >> $GITHUB_OUTPUT

      # 设置 QEMU（用于多平台交叉编译，支持 arm64 等）
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 设置 Docker Buildx（支持多平台 + 缓存）
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 登录 Docker Hub（PR 时跳过）
      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 自动生成镜像标签
      # - tag v1.2.3 push → :v1.2.3、:latest
      # - 手动触发     → :v1.2.3（最新 tag）、:latest
      # - PR           → 仅构建，不推送
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_IMAGE }}
          tags: |
            type=ref,event=tag
            type=raw,value=${{ steps.resolve.outputs.version }},enable=${{ github.event_name == 'workflow_dispatch' && steps.resolve.outputs.version != '' }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch' }}

      - name: Set Build Arguments
        id: build_args
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "APP_VERSION=${{ steps.resolve.outputs.version }}" >> $GITHUB_ENV
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "APP_VERSION=${{ github.ref_name }}" >> $GITHUB_ENV
          else
            echo "APP_VERSION=dev" >> $GITHUB_ENV
          fi

      # 构建并推送
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64   # 同时构建 x86_64 和 ARM64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ env.APP_VERSION }}
          # 使用 GitHub Actions 缓存加速构建
          cache-from: type=gha
          cache-to: type=gha,mode=max
