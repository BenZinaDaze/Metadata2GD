# Metadata2GD 配置文件

# ─────────────────────────────────────────────────────────
# TMDB 设置
# ─────────────────────────────────────────────────────────
tmdb:
  # TMDB v3 API Key（必填）
  # 申请地址：https://www.themoviedb.org/settings/api
  api_key: ""

  # 返回语言，IETF 语言标签
  # 常用：zh-CN（简体中文）、zh-TW、en-US、ja-JP
  language: "zh-CN"

  # HTTP 代理（可选），示例：http://127.0.0.1:7890
  proxy: ""

  # 请求超时（秒）
  timeout: 10

# ─────────────────────────────────────────────────────────
# 解析器设置
# ─────────────────────────────────────────────────────────
parser:
  # ── custom_words 自定义识别词 ──────────────────────────
  # 每行一条规则，支持 4 种格式：
  #
  # 【1】屏蔽词 —— 直接写词，会从标题中删除该词
  #     格式：  关键词
  #     示例：  "国语配音"
  #             → "某某剧 国语配音 S01E01.mkv" 变成 "某某剧 S01E01.mkv"
  #
  # 【2】替换词 —— 把旧词替换成新词（支持正则表达式）
  #     格式：  旧词 => 新词
  #     示例：  "港剧 => "          （替换为空，等同于屏蔽）
  #             "OVA => SP"         （把 OVA 统一成 SP）
  #             "第(\d+)话 => E\1"  （正则：第12话 → E12）
  #
  # 【3】集偏移 —— 修正集号偏差（前后字符串夹住集号数字）
  #     格式：  前缀 <> 后缀 >> EP+偏移量
  #             偏移量可为正数或负数
  #     示例：  "第 <> 话 >> EP+0"   （无偏移，仅标记格式）
  #             "第 <> 集 >> EP-1"   （集号减 1：第2集 → E01）
  #             "Ep <> End >> EP+12" （集号加 12：Ep01End → E13）
  #
  # 【4】组合 —— 先替换再偏移（用 && 连接）
  #     格式：  旧词 => 新词 && 前缀 <> 后缀 >> EP+偏移量
  #     示例：  "OVA => SP && SP <> . >> EP+100"
  #
  custom_words:
    # - "国语配音"               # 屏蔽词示例
    # - "港剧 => "               # 替换词示例（替换为空）
    # - "第 <> 集 >> EP-1"       # 集偏移示例

  # ── custom_release_groups 自定义字幕组 ────────────────
  # 追加到内置字幕组列表。
  # 格式：每行一个字幕组名称（字符串）。
  # 说明：内置列表已包含主流字幕组（SweetSub、Sakurato、TTG 等数百个），
  #       此处只需填写内置列表没有的组名。
  #
  # 示例：
  #   custom_release_groups:
  #     - "MyFansub"
  #     - "自制字幕组"
  #     - "SomeNewGroup"
  #
  custom_release_groups: []

# ─────────────────────────────────────────────────────────
# Google Drive 设置
# ─────────────────────────────────────────────────────────
drive:
  # 认证方式："oauth2" 或 "service_account"
  # oauth2          适合个人账号，首次运行弹浏览器授权
  # service_account 适合服务器自动化，不需要用户交互
  auth_mode: "oauth2"

  # OAuth2 凭据文件路径（auth_mode = oauth2 时使用）
  # 从 Google Cloud Console → API → 凭据 → 创建 OAuth2 Client ID(桌面应用) 下载
  credentials_json: "config/credentials.json"

  # OAuth2 Token 缓存路径（首次授权后自动生成，下次直接复用）
  token_json: "config/token.json"

  # Service Account JSON 路径（auth_mode = service_account 时使用）
  # 从 Google Cloud Console → IAM → 服务账号 → 创建密钥(JSON) 下载
  service_account_json: "config/service_account.json"

  # 扫描的目标 Drive 文件夹 ID
  # 在 Drive 网页版打开文件夹，URL 末尾即为 ID
  # 示例：https://drive.google.com/drive/folders/1AbCdEfGhIjKlMn → ID = 1AbCdEfGhIjKlMn
  # Service Account 场景下不能用 "root"，必须填具体 ID（并把文件夹共享给服务账号邮箱）
  scan_folder_id: ""

# ─────────────────────────────────────────────────────────
# 整理器设置（MediaOrganizer）
# ─────────────────────────────────────────────────────────
organizer:
  # 整理目标根文件夹 ID（必填，Drive 文件夹 ID）
  # 例：https://drive.google.com/drive/folders/1AbCdEfGhIjKlMn → 1AbCdEfGhIjKlMn
  root_folder_id: ""

  # 电影专用子目录 ID（可选）
  # 留空则使用 root_folder_id
  # 用途：将电影和剧集分别放到不同的顶层文件夹
  # 例：电影文件夹 ID
  movie_root_id: ""

  # 剧集专用子目录 ID（可选）
  # 留空则使用 root_folder_id
  # 例：剧集文件夹 ID
  tv_root_id: ""

  # 目录结构说明（与 MoviePilot / Plex / Infuse 默认格式一致）：
  #   电影：{root}/片名 (年份)/
  #   剧集：{root}/剧名 (年份)/Season N/

# ─────────────────────────────────────────────────────────
# 流水线设置（pipeline.py）
# ─────────────────────────────────────────────────────────
pipeline:
  # 是否跳过 TMDB 查询（True = 只整理文件夹，不生成 NFO）
  skip_tmdb: false

  # TMDB 找不到元数据时是否仍然移动文件
  # True  = 找不到也继续移动（不生成 NFO）
  # False = 找不到则跳过该文件
  move_on_tmdb_miss: true

  # dry_run 模式（True = 只打印计划，不实际操作 Drive）
  # 命令行 --dry-run 参数优先级更高
  dry_run: false

# ─────────────────────────────────────────────────────────
# Telegram 通知设置（可选）
# ─────────────────────────────────────────────────────────
telegram:
  # Bot Token，从 @BotFather 获取
  # 示例：123456789:ABCdefGHIjklMNOpqrSTUvwxYZ
  bot_token: ""

  # 接收通知的 Chat ID（个人账号或群组）
  # 获取方式：给 bot 发一条消息后访问
  # https://api.telegram.org/bot<Token>/getUpdates
  # 找 "chat": {"id": ...}
  chat_id: ""
