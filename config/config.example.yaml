# ─────────────────────────────────────────────────────────
# WebUI 认证设置
# ─────────────────────────────────────────────────────────
webui:
  # 登录用户名（默认 admin）
  username: "admin"

  # 登录密码（必填，留空则任何人都可以访问——非常不安全）
  password: ""

  # JWT 签名密钥（留空则自动生成并保存到 config/data/.jwt_secret）
  # 生产环境可指定固定密钥，确保重启后现有 token 仍有效
  secret_key: ""

  # Token 有效期（小时），默认 24 小时
  token_expire_hours: 24

  # /trigger 端点的 Webhook 密钥（留空则不校验，适合内网部署）
  # rclone/aria2 通知时需在请求头 X-Webhook-Secret 中携带此密钥
  webhook_secret: ""

  # 日志保留天数
  # 日志按天写入 config/data/logs/YYYY-MM-DD.jsonl，超过保留天数的旧文件会自动清理
  log_retention_days: 7

# ─────────────────────────────────────────────────────────
# 存储后端设置
# ─────────────────────────────────────────────────────────
storage:
  # 主流程使用的存储 Provider
  # 可选值：google_drive / pan115 / quark
  # pipeline.py / organizer 会使用此 Provider 进行文件整理
  # 也可以通过 CLI 参数 --storage 覆盖
  primary: "google_drive"

# ─────────────────────────────────────────────────────────
# Aria2 RPC 设置
# ─────────────────────────────────────────────────────────
aria2:
  # 是否启用 Aria2 集成
  # true  = 启用下载中心、RPC 状态读取与任务操作
  # false = 关闭整个 Aria2 集成，前端不会主动连接，也不会显示可操作状态
  enabled: true

  # Aria2 RPC 主机
  host: "127.0.0.1"

  # Aria2 RPC 端口
  port: 6800

  # JSON-RPC 路径
  path: "/jsonrpc"

  # RPC 密钥，对应 aria2.conf / docker-compose 里的 RPC_SECRET
  secret: ""

  # 是否使用 HTTPS/WSS
  secure: false

# Meta2Cloud 配置文件

# ─────────────────────────────────────────────────────────
# TMDB 设置
# ─────────────────────────────────────────────────────────
tmdb:
  # TMDB v3 API Key（必填）
  # 申请地址：https://www.themoviedb.org/settings/api
  api_key: ""

  # 返回语言，IETF 语言标签
  # 常用：zh-CN（简体中文）、zh-TW、en-US、ja-JP
  language: "zh-CN"

  # HTTP 代理（可选），示例：http://127.0.0.1:7890
  proxy: ""

  # 请求超时（秒）
  timeout: 10

# 文件名识别规则已独立到同目录的 parser-rules.yaml
# 请复制 config/parser-rules.example.yaml 为 parser-rules.yaml 后单独维护

# ─────────────────────────────────────────────────────────
# Google Drive 设置
# ─────────────────────────────────────────────────────────
drive:
  # OAuth2 凭据文件路径
  # 从 Google Cloud Console → API → 凭据 → 创建 OAuth2 Client ID(桌面应用) 下载
  credentials_json: "config/credentials.json"

  # OAuth2 Token 缓存路径（首次授权后自动生成，下次直接复用）
  token_json: "config/token.json"

  # 扫描的目标 Drive 文件夹 ID
  # 在 Drive 网页版打开文件夹，URL 末尾即为 ID
  # 示例：https://drive.google.com/drive/folders/1AbCdEfGhIjKlMn → ID = 1AbCdEfGhIjKlMn
  scan_folder_id: ""

  # 媒体库根目录 ID（必填，Google Drive 文件夹 ID）
  # 例：https://drive.google.com/drive/folders/1AbCdEfGhIjKlMn → 1AbCdEfGhIjKlMn
  root_folder_id: ""

  # 电影专用目录 ID（可选）
  # 留空则使用 root_folder_id
  # 用途：将电影和剧集分别放到不同的顶层文件夹
  # 例：电影文件夹 ID
  movie_root_id: ""

  # 剧集专用目录 ID（可选）
  # 留空则使用 root_folder_id
  # 例：剧集文件夹 ID
  tv_root_id: ""

  # 目录结构说明（与 Plex / Infuse 默认格式一致）：
  #   电影：{root}/片名 (年份)/
  #   剧集：{root}/剧名 (年份)/Season N/

# ─────────────────────────────────────────────────────────
# 115 网盘设置
# ─────────────────────────────────────────────────────────
u115:
  # 115 开放平台 client_id
  client_id: "100197847"

  # 115 access_token / refresh_token 缓存路径
  token_json: "config/115-token.json"

  # 115 扫码授权会话缓存路径
  session_json: "config/115-device-session.json"

  # 115 云下载目录 ID（可选）
  # 用于保存离线下载任务产物
  download_folder_id: ""

  # 115 媒体库根目录 ID（可选）
  # 用于后续区分 115 与 Google Drive 的媒体库存储位置
  root_folder_id: ""

  # 115 电影专用目录 ID（可选）
  # 留空则使用 root_folder_id
  movie_root_id: ""

  # 115 剧集专用目录 ID（可选）
  # 留空则使用 root_folder_id
  tv_root_id: ""

  # 115 云下载完成后是否自动触发整理流程
  auto_organize_enabled: false

  # 自动整理轮询间隔（秒）
  auto_organize_poll_seconds: 45

  # 检测到任务完成后，额外等待多少秒再触发整理
  auto_organize_stable_seconds: 30

# ─────────────────────────────────────────────────────────
# 夸克网盘设置
# ─────────────────────────────────────────────────────────
quark:
  # 夸克 access_token 缓存路径
  token_json: "config/quark-token.json"

  # 夸克云下载目录 ID（可选）
  # 用于保存离线下载任务产物
  download_folder_id: ""

  # 夸克媒体库根目录 ID（可选）
  # 用于区分不同网盘的媒体库存储位置
  root_folder_id: ""

  # 夸克电影专用目录 ID（可选）
  # 留空则使用 root_folder_id
  movie_root_id: ""

  # 夸克剧集专用目录 ID（可选）
  # 留空则使用 root_folder_id
  tv_root_id: ""

  # 夸克云下载完成后是否自动触发整理流程
  auto_organize_enabled: false

  # 自动整理轮询间隔（秒）
  auto_organize_poll_seconds: 45

  # 检测到任务完成后，额外等待多少秒再触发整理
  auto_organize_stable_seconds: 30

# ─────────────────────────────────────────────────────────
# 流水线设置（pipeline.py）
# ─────────────────────────────────────────────────────────
pipeline:
  # 是否跳过 TMDB 查询（True = 只整理文件夹，不生成 NFO）
  skip_tmdb: false

  # TMDB 找不到元数据时是否仍然移动文件
  # True  = 找不到也继续移动（不生成 NFO）
  # False = 找不到则跳过该文件
  move_on_tmdb_miss: false

  # dry_run 模式（True = 只打印计划，不实际操作 Drive）
  # 命令行 --dry-run 参数优先级更高
  dry_run: false

# ─────────────────────────────────────────────────────────
# Telegram 通知设置（可选）
# ─────────────────────────────────────────────────────────
telegram:
  # Bot Token，从 @BotFather 获取
  # 示例：123456789:ABCdefGHIjklMNOpqrSTUvwxYZ
  bot_token: ""

  # 接收通知的 Chat ID（个人账号或群组）
  # 获取方式：给 bot 发一条消息后访问
  # https://api.telegram.org/bot<Token>/getUpdates
  # 找 "chat": {"id": ...}
  chat_id: ""

  # 防抖延时（秒）：server.py 收到 /trigger 后等待该时间才真正运行 Pipeline
  # 等待期间若再次收到触发，计时器重置（相当于"最后一次触发后再等 N 秒"）
  # 作用：批量入库时多集合并成一条 TG 通知，而不是每集发一次
  # 推荐：60（1 分钟），set 0 关闭防抖（立即触发，旧行为）
  debounce_seconds: 60
